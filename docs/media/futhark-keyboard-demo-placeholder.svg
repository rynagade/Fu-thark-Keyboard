<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Futhark Keyboard Demo Placeholder</title>
  <desc id="desc">Placeholder card for a future demo GIF of the Futhark keyboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2a33"/>
      <stop offset="100%" stop-color="#394d58"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="80" y="72" width="1040" height="531" rx="32" fill="#edf2f5" stroke="#90a4af" stroke-width="3"/>
  <polygon points="555,260 555,415 700,337.5" fill="#2b4b5c"/>
  <text x="120" y="160" fill="#223742" font-family="Georgia, serif" font-size="42" font-weight="700">Demo GIF Placeholder</text>
  <text x="120" y="214" fill="#4b6370" font-family="Helvetica, Arial, sans-serif" font-size="28">Replace this card with a short recording that shows:</text>
  <text x="150" y="276" fill="#223742" font-family="Helvetica, Arial, sans-serif" font-size="26">1. Switching between Elder and Younger Futhark</text>
  <text x="150" y="322" fill="#223742" font-family="Helvetica, Arial, sans-serif" font-size="26">2. Typing a few runes into a text field</text>
  <text x="150" y="368" fill="#223742" font-family="Helvetica, Arial, sans-serif" font-size="26">3. Using punctuation, delete, and return</text>
  <text x="120" y="520" fill="#4b6370" font-family="Helvetica, Arial, sans-serif" font-size="24">Suggested file: docs/media/futhark-keyboard-demo.gif</text>
</svg>
